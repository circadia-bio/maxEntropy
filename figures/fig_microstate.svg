<svg width="680" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <style>
    .t  { font-size:14px; fill:#333; }
    .ts { font-size:12px; fill:#555; }
    .th { font-size:14px; fill:#333; font-weight:500; }
    .box-purple { fill:#EEEDFE; stroke:#534AB7; }
    .box-gray   { fill:#F1EFE8; stroke:#5F5E5A; }
    .box-teal   { fill:#E1F5EE; stroke:#0F6E56; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text class="ts" x="40" y="28">1. Sample point pairs from time series</text>
  <polyline points="40,78 80,53 120,88 160,58 200,83 240,48 280,73 320,43 360,78 400,53"
            fill="none" stroke="#7F77DD" stroke-width="1.5"/>
  <circle cx="120" cy="88" r="5" fill="#E85D24"/>
  <text class="ts" x="120" y="108" text-anchor="middle">xᵢ</text>
  <circle cx="320" cy="43" r="5" fill="#1D9E75"/>
  <text class="ts" x="320" y="36" text-anchor="middle">xⱼ</text>
  <line x1="120" y1="113" x2="320" y2="113" stroke="#888" stroke-width="0.7" stroke-dasharray="3 3"
        marker-end="url(#arrow)" marker-start="url(#arrow)" fill="none"/>
  <text class="ts" x="220" y="128" text-anchor="middle">|xᵢ − xⱼ| ≤ ε ?</text>

  <text class="ts" x="40" y="163">3. Repeat 18 000 times → distribution over 512 microstates</text>
  <rect x="40"  y="238" width="6" height="55" rx="2" fill="#7F77DD" opacity="0.7"/>
  <rect x="52"  y="263" width="6" height="30" rx="2" fill="#7F77DD" opacity="0.5"/>
  <rect x="64"  y="248" width="6" height="45" rx="2" fill="#7F77DD" opacity="0.7"/>
  <rect x="76"  y="270" width="6" height="23" rx="2" fill="#7F77DD" opacity="0.4"/>
  <rect x="88"  y="253" width="6" height="40" rx="2" fill="#7F77DD" opacity="0.6"/>
  <rect x="100" y="276" width="6" height="17" rx="2" fill="#7F77DD" opacity="0.4"/>
  <rect x="112" y="260" width="6" height="33" rx="2" fill="#7F77DD" opacity="0.5"/>
  <rect x="124" y="243" width="6" height="50" rx="2" fill="#7F77DD" opacity="0.7"/>
  <rect x="136" y="268" width="6" height="25" rx="2" fill="#7F77DD" opacity="0.4"/>
  <rect x="148" y="256" width="6" height="37" rx="2" fill="#7F77DD" opacity="0.6"/>
  <line x1="40" y1="295" x2="165" y2="295" stroke="#888" stroke-width="0.5" fill="none"/>
  <text class="ts" x="40" y="311">p₁  p₂  p₃  ...  p₅₁₂</text>
  <line x1="220" y1="273" x2="375" y2="273" stroke="#7F77DD" stroke-width="1.2"
        marker-end="url(#arrow)" fill="none"/>
  <rect x="380" y="250" width="48" height="48" rx="8" class="box-teal" stroke-width="0.5"/>
  <text class="th" x="404" y="267" text-anchor="middle" dominant-baseline="central">S =</text>
  <text class="ts" x="404" y="285" text-anchor="middle" dominant-baseline="central">−Σpᵢ ln pᵢ</text>

  <line x1="440" y1="20" x2="440" y2="320" stroke="#ccc" stroke-width="0.5" stroke-dasharray="4 4" fill="none"/>
  <text class="ts" x="458" y="28">2. Encode 3×3 block as microstate integer</text>

  <rect x="458" y="48" width="44" height="44" rx="4" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="480" y="70" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="508" y="48" width="44" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th" x="530" y="70" text-anchor="middle" dominant-baseline="central">0</text>
  <rect x="558" y="48" width="44" height="44" rx="4" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="580" y="70" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="458" y="98" width="44" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th" x="480" y="120" text-anchor="middle" dominant-baseline="central">0</text>
  <rect x="508" y="98" width="44" height="44" rx="4" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="530" y="120" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="558" y="98" width="44" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th" x="580" y="120" text-anchor="middle" dominant-baseline="central">0</text>
  <rect x="458" y="148" width="44" height="44" rx="4" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="480" y="170" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="508" y="148" width="44" height="44" rx="4" class="box-purple" stroke-width="0.5"/>
  <text class="th" x="530" y="170" text-anchor="middle" dominant-baseline="central">1</text>
  <rect x="558" y="148" width="44" height="44" rx="4" class="box-gray" stroke-width="0.5"/>
  <text class="th" x="580" y="170" text-anchor="middle" dominant-baseline="central">0</text>

  <text class="ts" x="480" y="207" text-anchor="middle">2⁰</text>
  <text class="ts" x="530" y="207" text-anchor="middle">2¹</text>
  <text class="ts" x="580" y="207" text-anchor="middle">2²</text>
  <text class="ts" x="480" y="222" text-anchor="middle">2³</text>
  <text class="ts" x="530" y="222" text-anchor="middle">2⁴</text>
  <text class="ts" x="580" y="222" text-anchor="middle">2⁵</text>
  <text class="ts" x="480" y="237" text-anchor="middle">2⁶</text>
  <text class="ts" x="530" y="237" text-anchor="middle">2⁷</text>
  <text class="ts" x="580" y="237" text-anchor="middle">2⁸</text>

  <line x1="520" y1="245" x2="520" y2="265" stroke="#7F77DD" stroke-width="1.2"
        marker-end="url(#arrow)" fill="none"/>
  <rect x="458" y="268" width="144" height="48" rx="8" class="box-teal" stroke-width="0.5"/>
  <text class="th" x="530" y="286" text-anchor="middle" dominant-baseline="central">microstate index</text>
  <text class="ts" x="530" y="304" text-anchor="middle" dominant-baseline="central">1 of 2⁹ = 512 patterns</text>
</svg>
